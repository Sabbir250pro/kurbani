<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>কুরবানি ঈদ মোবারক!</title>
    <style>
        /* পুরো পেজের ডিজাইন */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1dd1a1, #10ac84, #00d2d3);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* কার্ডের ডিজাইন */
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 380px;
            width: 90%;
            position: relative;
            z-index: 10;
            border: 4px solid #00b894;
            animation: bounce 2.5s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            color: #d63031;
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        .sub-text {
            color: #2d3436;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .funny-quote {
            font-weight: bold;
            color: #0984e3;
            background: #f1f2f6;
            padding: 10px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 0.95em;
        }

        /* বাটন ডিজাইন */
        .btn {
            background: #e17055;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(225, 112, 85, 0.4);
            width: 100%;
            margin-bottom: 10px;
        }

        .btn-share {
            background: #0984e3;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            width: 80%;
            margin-top: 10px;
        }

        .btn:hover { background: #d63031; transform: scale(1.03); }

        /* মেসেজ বক্স */
        #reply-box {
            margin-top: 15px;
            font-weight: bold;
            color: #2c3e50;
            min-height: 60px;
            padding: 10px;
            border-top: 2px dashed #b2bec3;
            font-size: 1.05em;
        }

        /* টাকা ও গরুর এনিমেশন */
        .falling-item {
            position: absolute;
            top: -50px;
            z-index: 5;
            pointer-events: none;
            animation: fall 3s linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>কুরবানি ঈদ মোবারক! 🐄</h1>
        <p class="sub-text">ত্যাগের মহিমায় ভাসুক দিন,<br>তোর পকেট হোক সালামি বিলীন!</p>
        
        <div class="funny-quote">
            "গরু হাসলে ঈদ আসে,<br>তুই হাসলে গরু হাসে!" 🐐
        </div>

        <button id="mainBtn" class="btn" onclick="handleSalamiLogic()">সালামি নাও! 💸</button>
        
        <div id="reply-box">বাটনে ২ বার ক্লিক করে সালামি বুঝে নাও!</div>

        <button class="btn-share" onclick="shareToFriends()">বন্ধুদের শেয়ার করো 🔗</button>
    </div>

    <script>
        let clickCounter = 0;
        // আপনার দেওয়া অ্যাড লিংক
        const targetUrl = "https://www.effectivecpmnetwork.com/zqzgww0au?key=0f4d48fa9d68e7a7c2936e53116f3035";

        function handleSalamiLogic() {
            clickCounter++;
            const btn = document.getElementById('mainBtn');
            const reply = document.getElementById('reply-box');

            if (clickCounter === 1) {
                // প্রথম ক্লিক
                btn.innerText = "আগে গরু সামলা! 🐮";
                reply.innerText = "উফ! এক ক্লিকে কি আর সালামি হয়? আরেকবার ক্লিক কর দেখি!";
                reply.style.color = "#d63031";
            } 
            else if (clickCounter === 2) {
                // দ্বিতীয় ক্লিক - আপনার লিংক ওপেন হবে
                window.open(targetUrl, '_blank');
                btn.innerText = "আবার চাস? 😂 ক্লিক কর!🤭";
                reply.innerText = "তোর সালামি বিকাশ করা হয়েছে (স্বপ্নে)! 😂 চেক কর গিয়ে!";
                reply.style.color = "#009432";
                triggerAnimation();
            }
            else {
                // তৃতীয় বা তার পরের ক্লিক - শুধু মজার মেসেজ ও এনিমেশন
                reply.innerText = getFunnyKurbaniMessage();
                reply.style.color = "#009432";
                triggerAnimation();
            }
        }

        function triggerAnimation() {
            for (let i = 0; i < 20; i++) {
                setTimeout(dropItems, i * 150);
            }
        }

        function getFunnyKurbaniMessage() {
            const jokes = [
                "বিকাশ নাম্বার দে, ভুলেও টাকা পাঠাবো না! 😂",
                "গরুর দাম শুনে পকেট হার্ট অ্যাটাক করেছে! 🚑",
                "সালামি বদলে ২ কেজি হাড় চিবানোর সুযোগ দেওয়া হবে! 🦴",
                "তোর বয়স তো গরুর দাঁতের সমান হয়ে গেছে! 🐄",
                "সালামি লোড হচ্ছে... গরুর গোবর পরিষ্কার কর আগে! 💩",
                "তোর কি শরম নাই? এই বুড়ো বয়সে সালামি চাস! 👴",
                "বেশি ক্লিক করলে গরু তোকে লাথি দিবে! 🐄👊",
                "সালামি চাইলে ব্লক খাবি, ইদ পর্যন্ত আনব্লক হবি না! 🚫",
                "একবার তো দিছি, আর কত চাস? কিপটা কোত্থেকে! 🤣",
                "গরুর হাটে পকেট সাফ, এখন আমিই তোর কাছে সালামি চাই! 💸",
                "৳৫০০০ পাঠিয়েছি, আজ রাতে স্বপ্নে গিয়ে রিসিভ করিস! 😴",
                "সালামি দিলে দোস্তি নষ্ট হয়ে যাবে, টাকা কি বন্ধুর চেয়ে বড়? 🤝",
                "তোর জন্য ১ টাকা পাঠিয়েছি, সাবধানে খরচ করিস! 💰",
                "আগে বল গরুর কয়টা দাঁত? বলতে পারলে সালামি কনফার্ম! 🦷",
                "কিপ্টামি আমার রক্তে নাই, কিন্তু বর্তমানে পকেটে টাকাও নাই! 😂",
                "সালামি টা গরুর পেটে চলে গেছে, খুঁজে বের করার দায়িত্ব তোর! 🐮",
                "বিকাশ পিন ভুলে গেছি, ইদ শেষ হলে মনে পড়বে! 🤐",
                "বেশি সালামি চাইলে ইদ মোবারক ক্যানসেল করে দিবো! ❌",
                "পকেট এখন আইসিইউ-তে আছে, শুধু মাংস খাওয়া যাবে! 🏥",
                "আগে মাংস কাটবি কয় কেজি সেটা বল, কাজের ওপর সালামি নির্ভর করবে! 🔪"
            ];
            return jokes[Math.floor(Math.random() * jokes.length)];
        }

        function dropItems() {
            const items = ['🐄', '🐐', '🍖', '💰', '৳', '🥩', '💵'];
            const drop = document.createElement('div');
            drop.className = 'falling-item';
            drop.innerText = items[Math.floor(Math.random() * items.length)];
            
            drop.style.left = Math.random() * 100 + 'vw';
            drop.style.fontSize = (Math.random() * 25 + 20) + 'px';
            drop.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
            
            document.body.appendChild(drop);

            setTimeout(() => { drop.remove(); }, 3000);
        }

        function shareToFriends() {
            const shareText = "বন্ধু, তোর জন্য একটি স্পেশাল ইদ গিফট পাঠালাম। দেখ পছন্দ হয় কি না!";
            const shareUrl = window.location.href;

            if (navigator.share) {
                navigator.share({
                    title: 'কুরবানি ঈদ মোবারক!',
                    text: shareText,
                    url: shareUrl
                }).catch(console.error);
            } else {
                // যদি ব্রাউজার সাপোর্ট না করে তবে লিংক কপি হবে
                const dummy = document.createElement('input');
                document.body.appendChild(dummy);
                dummy.value = shareUrl;
                dummy.select();
                document.execCommand('copy');
                document.body.removeChild(dummy);
                alert("লিংকটি কপি হয়েছে! এখন বন্ধুদের পাঠিয়ে দাও।");
            }
        }
    </script>
</body>
</html>
